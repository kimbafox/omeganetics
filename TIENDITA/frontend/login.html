<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Acceso</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <div class="logo-container">
    <img src="assets/logo.png" class="logo">
    <h1>Omeganetics Realm</h1>
  </div>
</header>

<div class="login-container">

  <div class="login-card">
    <h2>🔐 Acceso al Reino</h2>
    <p id="sesionActiva" style="display:none;"></p>

    <input type="email" id="correo" placeholder="Correo del aventurero">
    <input type="password" id="password" placeholder="Clave secreta">

    <button id="btnIngresar" onclick="login()">Ingresar</button>
    <button id="btnLogoutLogin" style="display:none;" onclick="cerrarSesion()">Cerrar sesión</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
