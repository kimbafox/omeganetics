<!DOCTYPE html>

    <section id="memberHero" class="resume-hero skeleton-card"></section>

        <div class="resume-panel">
          <span class="panel-label">Identidad</span>
          <div id="memberFullName" class="meta-list"></div>

      </section>

    <section class="member-workgroup-card resume-panel">
      <div class="panel-heading compact">
        <div>
          <span class="panel-label">Equipo de trabajo</span>
