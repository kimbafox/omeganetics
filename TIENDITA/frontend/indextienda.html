<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omeganetics Realm</title>
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="stylesheet" href="styles.css">
</head>
<body class="storefront-page">
<div class="page-glow" aria-hidden="true"></div>
<div class="page-ink page-ink-left" aria-hidden="true"></div>
<div class="page-ink page-ink-right" aria-hidden="true"></div>

<header class="header">
  <button class="logo-container logo-toggle" id="logoThemeToggle" type="button" aria-label="Cambiar tema visual de la tienda" title="Cambiar tema visual de la tienda">
    <img src="assets/logo.png" class="logo" alt="Logo de Omeganetics Realm">
    <div>
      <h1>Omeganetics Realm</h1>
      <p class="logo-subtitle">Tienda épica para creadores del reino</p>
    </div>
  </button>

  <nav>
    <a href="../../index.html" class="btn btn-secondary">Volver al index</a>
    <a href="login.html" id="btnEntrar" class="btn btn-secondary">Entrar</a>
    <a href="admin.html" id="btnAdmin" class="btn" style="display:none;">Panel Admin</a>
    <button id="btnLogout" class="btn btn-secondary" style="display:none;" onclick="cerrarSesion()">Cerrar sesión</button>
  </nav>
</header>

<main class="landing">
  

  <section class="carousel-shell">
    <div class="section-minihead">Destacados de la semana</div>
    <section class="carousel">
      <div class="slide active">
        <img src="assets/slide2.png" alt="Nuevas reliquias">
        <div class="texto">Nuevas reliquias</div>
      </div>

      <div class="slide">
        <img src="assets/slide1.png" alt="Herramientas legendarias">
        <div class="texto">Herramientas legendarias</div>
      </div>

      <div class="slide">
        <img src="assets/slide3.png" alt="Juegos del reino">
        <div class="texto">Juegos del reino</div>
      </div>
    </section>
  </section>

  <section id="catalogo" class="catalogo-shell">
    <div class="section-heading">
      <div>
        <span class="eyebrow">Catálogo</span>
        <h2>Explora el archivo del aventurero</h2>
        <p>Filtra por categoría, revisa descripciones más completas y abre cada ficha para ver su galería.</p>
      </div>
    </div>

    <section class="categorias">
      <button class="filtro-btn active" data-cat="todos" onclick="filtrar('todos')">Todos</button>
      <button class="filtro-btn" data-cat="omegacraft" onclick="filtrar('omegacraft')">Omegacraft</button>
      <button class="filtro-btn" data-cat="herramientas" onclick="filtrar('herramientas')">Herramientas</button>
      <button class="filtro-btn" data-cat="juegos" onclick="filtrar('juegos')">Juegos</button>
      <button class="filtro-btn" data-cat="libros" onclick="filtrar('libros')">Libros</button>
    </section>

    <section id="proyectos" class="grid"></section>
  </section>
</main>

<script src="app.js"></script>
</body>
</html>
