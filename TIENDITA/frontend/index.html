<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Omeganetics Realm</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <div class="logo-container">
    <img src="assets/logo.png" class="logo">
    <h1>Omeganetics Realm</h1>
  </div>

  <nav>
    <a href="login.html" id="btnEntrar" class="btn">Entrar</a>
    <a href="admin.html" id="btnAdmin" class="btn" style="display:none;">Panel Admin</a>
    <button id="btnLogout" class="btn" style="display:none;" onclick="cerrarSesion()">Cerrar sesión</button>
  </nav>
</header>

<!-- 🔥 CARRUSEL CON IMÁGENES -->
<section class="carousel">

  <div class="slide active">
    <img src="assets/slide1.jpg">
    <div class="texto">⚔️ Nuevas reliquias</div>
  </div>

  <div class="slide">
    <img src="assets/slide2.jpg">
    <div class="texto">🛡️ Herramientas legendarias</div>
  </div>

  <div class="slide">
    <img src="assets/slide3.jpg">
    <div class="texto">🎮 Juegos del reino</div>
  </div>

</section>

<!-- BOTONES -->
<section class="categorias">
  <button onclick="filtrar('todos')">Todos</button>
  <button onclick="filtrar('omegacraft')">Omegacraft</button>
  <button onclick="filtrar('herramientas')">Herramientas</button>
  <button onclick="filtrar('juegos')">Juegos</button>
</section>

<!-- PROYECTOS -->
<section id="proyectos" class="grid"></section>

<script src="app.js"></script>
</body>
</html>
